<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Workspace | Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0A1121; color: #F1F5F9; }
        
        /* The main container's soft background and border from the shot */
        .dashboard-container { 
            background-color: #FFFFFF; 
            border: 1px solid #E2E8F0; 
        }
        
        /* Glass/border style for the upper two buttons */
        .glass-button { 
            background: rgba(255, 255, 255, 0.7); 
            backdrop-filter: blur(5px); 
            border: 1px solid #E2E8F0; 
            transition: all 0.2s ease;
        }
        .glass-button:hover { background-color: #F8FAFC; }
        
        /* The solid navy style for the main CTA and Logo */
        .navy-style { background-color: #273248; border: 1px solid #E2E8F0; transition: all 0.2s ease; }
        .navy-style:hover { background-color: #1F2937; }

        /* NEON GLOW Effect from the image */
        .neon-glow {
            box-shadow: 0 0 10px rgba(100, 210, 255, 0.2), 
                        0 0 20px rgba(100, 210, 255, 0.1);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6 lg:p-12">
    <div class="max-w-md w-full dashboard-container rounded-[2.5rem] shadow-2xl p-10 text-center border-slate-200">
        
        <div class="mb-8 inline-flex items-center justify-center w-20 h-20 navy-style text-white rounded-3xl text-4xl shadow-lg border-2 border-slate-300">
            NX
        </div>
        
        <h1 class="text-3xl font-bold text-slate-900 mb-2 tracking-tight">Nexus Workspace</h1>
        <p class="text-slate-600 mb-10 font-medium text-md px-2"> An initiative by KIIT Nexus.</p>
        
        <div class="space-y-4">
            <a href="privacy-policy.html" class="block w-full py-4 px-6 glass-button rounded-xl text-slate-700 font-semibold shadow-sm">
                Privacy Policy
            </a>
            <a href="deletion.html" class="block w-full py-4 px-6 glass-button rounded-xl text-slate-700 font-semibold shadow-sm">
                Data Deletion Policy
            </a>
            <a href="mailto:ananyaraj12@gmail.com" class="block w-full py-4 px-6 navy-style text-white rounded-xl font-semibold shadow-xl neon-glow hover:translate-y-[-2px]">
                Contact Support
            </a>
        </div>
        
        <div class="mt-12 border-t border-slate-100 pt-6">
            <p class="text-xs text-slate-400 font-bold uppercase tracking-[0.2em] mb-1"> KIIT Nexus Workspace © 2026</p>
            <p class="text-[11px] text-slate-400">support: kiitnexus.in@gmail.com</p>
        </div>
    </div>
</body>
</html>
