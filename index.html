<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Workspace | Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --nexus-primary: #38BDF8;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: linear-gradient(-45deg, #0f172a, #1e293b, #020617, #1e1b4b);
            background-size: 400% 400%;
            animation: gradientMove 15s ease infinite;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0; 
            color: white;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .main-card { 
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 48px; 
            width: 100%; 
            max-width: 420px; 
            padding: 60px 40px; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); 
            text-align: center;
            transition: transform 0.3s ease;
        }

        .logo-container {
            position: relative; 
            width: 120px; 
            height: 120px; 
            margin: 0 auto 30px;
            display: flex; 
            align-items: center; 
            justify-content: center;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid var(--nexus-primary); 
            border-radius: 32px;
            box-shadow: 0 0 30px rgba(56, 189, 248, 0.3);
            overflow: hidden;
        }

        .logo-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            padding: 15px;
            filter: drop-shadow(0 0 10px rgba(56, 189, 248, 0.2));
        }

        .btn-nexus {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%; 
            padding: 20px 24px; 
            margin-bottom: 16px;
            border-radius: 24px; 
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white; 
            font-weight: 600; 
            text-decoration: none;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-nexus:hover { 
            background: rgba(56, 189, 248, 0.1);
            border-color: var(--nexus-primary);
            transform: translateY(-5px);
            box-shadow: 0 15px 30px -5px rgba(56, 189, 248, 0.2);
        }

        .btn-nexus svg {
            transition: transform 0.3s ease;
            opacity: 0.5;
        }

        .btn-nexus:hover svg {
            transform: translateX(5px);
            opacity: 1;
            stroke: var(--nexus-primary);
        }
    </style>
</head>
<body>
    <div class="main-card">
        <div class="logo-container">
            <img src="assets/logo.jpeg" alt="Nexus Logo">
        </div>
        
        <h1 class="text-3xl font-extrabold text-white mb-2 tracking-tight uppercase">Nexus Workspace</h1>
        <p class="text-slate-400 font-bold mb-12 uppercase tracking-[0.3em] text-[10px]">Initiative by KIIT Nexus</p>
        
        <div class="space-y-4">
            <a href="privacy-policy.html" class="btn-nexus">
                <span>Privacy Policy</span>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
            </a>
            <a href="deletion.html" class="btn-nexus">
                <span>Data Deletion Policy</span>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
            </a>
        </div>

        <div class="mt-16 border-t border-white/5 pt-8 text-slate-500 uppercase tracking-widest text-[9px] font-black">
            NEXUS Ecosystem &bull; 2026
        </div>
    </div>
</body>
</html>
